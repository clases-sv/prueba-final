<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba · Accesos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;
    --muted:#6b6b6b;
    --line:#e6e6e6;
    --surface:#ffffff;
    --bg:#ffffff;
    --accent:#1a1a1a;
    --radius:18px;
    --shadow:0 1px 2px rgba(0,0,0,.05);
    --shadow-lift:0 18px 40px -18px rgba(0,0,0,.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    color:var(--ink);
    background:var(--bg);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:clamp(20px,5vw,56px);
    -webkit-font-smoothing:antialiased;
  }
  .shell{width:100%;max-width:1020px;}

  /* Hero */
  .hero{text-align:center;margin:0 auto clamp(28px,5vw,44px);max-width:680px;}
  .wordmark{
    display:inline-flex;align-items:center;gap:14px;justify-content:center;
  }
  .wordmark span{
    font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:-.02em;
    font-size:clamp(38px,8vw,54px);line-height:1;
    color:var(--ink);
  }
  .tagline{
    margin:16px auto 0;color:var(--muted);font-size:clamp(15px,2.4vw,17px);
    line-height:1.55;max-width:460px;
  }
  .tagline b{color:var(--ink);font-weight:600;}

  /* Grid */
  .grid{
    display:grid;gap:16px;
    grid-template-columns:repeat(3,1fr);
  }
  @media (max-width:760px){ .grid{grid-template-columns:1fr;} }

  .card{
    position:relative;text-decoration:none;color:inherit;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:24px 22px 20px;
    display:flex;flex-direction:column;gap:16px;
    box-shadow:var(--shadow);
    transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
  }
  .card:hover,.card:focus-visible{
    transform:translateY(-5px);
    box-shadow:var(--shadow-lift);
    border-color:#cccccc;
    outline:none;
  }
  .card:focus-visible{box-shadow:var(--shadow-lift),0 0 0 3px rgba(0,0,0,.25);}

  .card__icon{
    width:48px;height:48px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);background:#f4f4f4;
  }
  .card__icon svg{width:25px;height:25px;}
  .card--students .card__icon{color:var(--ink);background:#f4f4f4;}
  .card--tablet  .card__icon{color:var(--ink);background:#f4f4f4;}

  .card__body{display:flex;flex-direction:column;gap:6px;flex:1;}
  .card__title{
    font-family:'Poppins',sans-serif;font-weight:600;
    font-size:17px;line-height:1.3;letter-spacing:-.01em;
  }
  .card__desc{color:var(--muted);font-size:13.5px;line-height:1.5;}

  .card__go{
    display:inline-flex;align-items:center;gap:7px;
    font-weight:600;font-size:14px;color:var(--ink);
    margin-top:2px;
  }
  .card__go svg{width:17px;height:17px;transition:transform .22s ease;}
  .card:hover .card__go svg,.card:focus-visible .card__go svg{transform:translateX(4px);}

  footer{
    text-align:center;margin-top:clamp(26px,4vw,38px);
    color:var(--muted);font-size:12.5px;line-height:1.5;
  }

  @media (prefers-reduced-motion:reduce){
    .card,.card__go svg{transition:none;}
    .card:hover,.card:focus-visible{transform:none;}
  }
</style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="wordmark">
        <span>Prueba</span>
      </div>
      <p class="tagline">Centro de accesos. <br />Elige la aplicación que necesitas usar.</p>
    </header>

    <nav class="grid" aria-label="Aplicaciones del programa Prueba">
      <a class="card card--staff" href="https://script.google.com/a/macros/goes.gob.sv/s/AKfycbyWlZIeTl-4V1ir4VjKRuQApXXtrhun81n1Gn91uWC3N64Ep2PhtA93obiAU8ANnNAA/exec" target="_blank" rel="noopener noreferrer">
        <span class="card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><path d="M16.5 4.5a3 3 0 0 1 0 6"/><path d="M17 13.6c2.4.5 4 2.3 4 4.9"/></svg></span>
        <span class="card__body">
          <span class="card__title">Asistencia del personal técnico</span>
          <span class="card__desc">PARA USO DEL ADMINISTRADOR.</span>
        </span>
        <span class="card__go" aria-hidden="true">Abrir
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13"/><path d="m13 6 6 6-6 6"/></svg>
        </span>
      </a>
      <a class="card card--students" href="https://script.google.com/a/macros/goes.gob.sv/s/AKfycbyHCYhmWQUpA5TI0D9fAn_uKMy7lP4f0wJDl5SmMa-XwBRxFCQULYQ7rJUb-tg2nOat/exec" target="_blank" rel="noopener noreferrer">
        <span class="card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 2.5 8.5 12 13l9.5-4.5L12 4Z"/><path d="M6.5 10.8V15c0 1.4 2.7 2.6 5.5 2.6s5.5-1.2 5.5-2.6v-4.2"/><path d="M21.5 8.5v5"/></svg></span>
        <span class="card__body">
          <span class="card__title">Asistencia de estudiantes</span>
          <span class="card__desc">PARA USO DEL CUIDADOR.</span>
        </span>
        <span class="card__go" aria-hidden="true">Abrir
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13"/><path d="m13 6 6 6-6 6"/></svg>
        </span>
      </a>
      <a  class="card card--tablet" href="https://script.google.com/a/macros/goes.gob.sv/s/AKfycbw9BGYtkdcBWuQXPs8LO0YZk0YNG_po5V69-3nMiIVliKs9j6qWCbksJOTe7R4IbBcr/exec" target="_blank" rel="noopener noreferrer">
        <span class="card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2.4"/><line x1="11" y1="17.6" x2="13" y2="17.6"/></svg></span>
        <span class="card__body">
          <span class="card__title">Entrega de tablets</span>
          <span class="card__desc">Seguimiento de la entrega de tablets a estudiantes.</span>
        </span>
        <span class="card__go" aria-hidden="true">Abrir
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13"/><path d="m13 6 6 6-6 6"/></svg>
        </span>
      </a>
    </nav>

    <footer>Programa Prueba</footer>
  </main>
</body>
</html>
